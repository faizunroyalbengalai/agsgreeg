<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>aff</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 640px;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #238636, #2ea043);
      color: #ffffff;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.35rem 1rem;
      border-radius: 999px;
    }

    .card {
      width: 100%;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 3rem 2.5rem;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #58a6ff, #bc8cff, #58a6ff);
      background-size: 200% 100%;
      animation: shimmer 3s linear infinite;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .project-label {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #8b949e;
      margin-bottom: 0.75rem;
    }

    .project-name {
      font-size: 4rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #58a6ff 0%, #bc8cff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
      margin-bottom: 2rem;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: #30363d;
      margin: 0 auto 2rem;
      border-radius: 999px;
    }

    .repo-label {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #8b949e;
      margin-bottom: 0.6rem;
    }

    .repo-box {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 0.75rem 1.5rem;
      font-size: 1.1rem;
      font-weight: 600;
      color: #58a6ff;
      letter-spacing: 0.02em;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .repo-box:hover {
      border-color: #58a6ff;
      box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
    }

    .repo-box svg {
      flex-shrink: 0;
      opacity: 0.8;
    }

    .stats-row {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid #21262d;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
    }

    .stat-value {
      font-size: 1.25rem;
      font-weight: 700;
      color: #e6edf3;
    }

    .stat-label {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #8b949e;
    }

    footer {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.82rem;
      color: #8b949e;
      letter-spacing: 0.04em;
    }

    footer span {
      color: #58a6ff;
      font-weight: 600;
    }

    @media (max-width: 480px) {
      .project-name {
        font-size: 3rem;
      }
      .card {
        padding: 2rem 1.5rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="badge">&#x2022; Active Project</div>

    <div class="card">
      <p class="project-label">Project Name</p>
      <h1 class="project-name">aff</h1>

      <div class="divider"></div>

      <p class="repo-label">Repository</p>
      <div class="repo-box">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
        </svg>
        agsgreeg
      </div>

      <div class="stats-row">
        <div class="stat">
          <span class="stat-value">v1.0</span>
          <span class="stat-label">Version</span>
        </div>
        <div class="stat">
          <span class="stat-value">MIT</span>
          <span class="stat-label">License</span>
        </div>
        <div class="stat">
          <span class="stat-value">Open</span>
          <span class="stat-label">Source</span>
        </div>
      </div>
    </div>

    <footer>
      Developed by <span>Royal Bengal AI</span>
    </footer>

  </div>

</body>
</html>
